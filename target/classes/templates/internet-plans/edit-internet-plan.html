<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/commons::head}"><title>Edit Internet Plan | Admin</title></head>
<body class="bg-light">
<header th:replace="~{fragments/commons::navbar}"></header>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
            <div class="card border-0 shadow-lg" style="border-radius: 1rem;">
                <div class="card-body p-4 p-md-5">

                    <!-- Header -->
                    <div class="text-center mb-4">
                        <div class="bg-success bg-opacity-10 d-inline-block p-3 rounded-circle mb-3">
                            <i class="bi bi-pencil-square text-success fs-2"></i>
                        </div>
                        <h2 class="fw-bold">Edit Internet Plan</h2>
                        <p class="text-muted small">Modifying: <span class="fw-bold text-dark" th:text="${internetPlanFromRepo.name}">Plan Name</span></p>
                    </div>

                    <form th:object="${internetPlanFromRepo}"
                          th:action="@{/internet/edit-internet-plan/{id}(id=*{id})}"
                          th:method="patch">

                        <!-- Plan Name & Price (Read-only) -->
                        <div class="row g-3 mb-3">
                            <div class="col-md-8">
                                <div class="form-floating">
                                    <input th:field="*{name}" class="form-control bg-light" id="name" readonly>
                                    <label for="name">Plan Name</label>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-floating">
                                    <input th:field="*{price}" class="form-control bg-light" id="price" readonly>
                                    <label for="price">Price ($)</label>
                                </div>
                            </div>
                        </div>

                        <!-- Plan Duration -->
                        <div class="form-floating mb-4">
                            <input th:field="*{planDuration}" th:errorclass="is-invalid" type="text" class="form-control" id="planDuration" placeholder="Duration">
                            <label for="planDuration">Plan Duration</label>
                            <div th:if="${#fields.hasErrors('planDuration')}" th:errors="*{planDuration}" class="invalid-feedback"></div>
                        </div>

                        <!-- Performance Group -->
                        <h5 class="mb-3 text-secondary border-bottom pb-2">
                            <i class="bi bi-speedometer2 me-2"></i>Speed Parameters (Mbps)
                        </h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input th:field="*{downloadMbps}" th:errorclass="is-invalid" type="text" class="form-control" id="downloadMbps" placeholder="Download">
                                    <label for="downloadMbps">Download Speed</label>
                                    <div th:if="${#fields.hasErrors('downloadMbps')}" th:errors="*{downloadMbps}" class="invalid-feedback"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input th:field="*{uploadMbps}" th:errorclass="is-invalid" type="text" class="form-control" id="uploadMbps" placeholder="Upload">
                                    <label for="uploadMbps">Upload Speed</label>
                                    <div th:if="${#fields.hasErrors('uploadMbps')}" th:errors="*{uploadMbps}" class="invalid-feedback"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Status Switch -->
                        <div class="card bg-light border-0 mb-5">
                            <div class="card-body py-2 d-flex align-items-center justify-content-between">
                                <label class="form-check-label fw-bold text-secondary" for="isActive">Activate/Deactivate</label>
                                <div class="form-check form-switch p-0 m-0">
                                    <input class="form-check-input" type="checkbox" role="switch" id="isActive" th:field="*{active}" style="width: 2.5em; height: 1.25em;">
                                </div>
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="row g-2 pt-2">
                            <div class="col-sm-8">
                                <button type="submit" class="btn btn-success btn-lg w-100 shadow-sm fw-bold">
                                    Save Changes
                                </button>
                            </div>
                            <div class="col-sm-4">
                                <a th:href="@{/internet/internet-plans}" class="btn btn-outline-secondary btn-lg w-100">
                                    Cancel
                                </a>
                            </div>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/commons::footer}"></footer>
</body>
</html>
