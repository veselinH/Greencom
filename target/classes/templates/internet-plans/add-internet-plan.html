<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/commons::head}"><title>Add Internet Plan | Admin</title></head>
<body class="bg-light">
<header th:replace="~{fragments/commons::navbar}"></header>

<main class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-10 col-lg-8">
      <div class="card border-0 shadow-lg" style="border-radius: 1rem;">
        <div class="card-body p-4 p-md-5">

          <!-- Header with Icon -->
          <div class="text-center mb-4">
            <div class="bg-success bg-opacity-10 d-inline-block p-3 rounded-circle mb-3">
              <i class="bi bi-router text-success fs-1"></i>
            </div>
            <h2 class="fw-bold">Create Internet Plan</h2>
            <p class="text-muted small">Configure high-speed fiber or wireless connectivity options</p>
          </div>

          <form th:object="${internetPlanBindingModel}" th:action="@{/internet/add-internet-plan}" th:method="POST">

            <!-- Plan Name & Duration Row -->
            <div class="row g-3 mb-3">
              <div class="col-md-8">
                <div class="form-floating">
                  <input th:field="*{name}" th:errorclass="is-invalid" type="text" class="form-control" id="name" placeholder="GigaFiber 500">
                  <label for="name">Plan Name</label>
                  <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="invalid-feedback"></div>
                </div>
              </div>
              <div class="col-md-4">
                <div class="form-floating">
                  <input th:field="*{planDuration}" th:errorclass="is-invalid" type="text" class="form-control" id="planDuration" placeholder="24 months">
                  <label for="planDuration">Duration</label>
                  <div th:if="${#fields.hasErrors('planDuration')}" th:errors="*{planDuration}" class="invalid-feedback"></div>
                </div>
              </div>
            </div>

            <!-- Speed Parameters Section -->
            <h5 class="mb-3 text-secondary border-bottom pb-2">
              <i class="bi bi-speedometer2 me-2"></i>Performance (Mbps)
            </h5>
            <div class="row g-3 mb-4">
              <div class="col-md-6">
                <div class="form-floating">
                  <input th:field="*{downloadMbps}" th:errorclass="is-invalid" type="text" class="form-control" id="downloadMbps" placeholder="500">
                  <label for="downloadMbps">Download Speed</label>
                  <div th:if="${#fields.hasErrors('downloadMbps')}" th:errors="*{downloadMbps}" class="invalid-feedback"></div>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-floating">
                  <input th:field="*{uploadMbps}" th:errorclass="is-invalid" type="text" class="form-control" id="uploadMbps" placeholder="250">
                  <label for="uploadMbps">Upload Speed</label>
                  <div th:if="${#fields.hasErrors('uploadMbps')}" th:errors="*{uploadMbps}" class="invalid-feedback"></div>
                </div>
              </div>
            </div>

            <!-- Price & Connection Type Row -->
            <div class="row g-3 mb-4">
              <div class="col-md-6">
                <div class="input-group">
                  <span class="input-group-text bg-success text-white border-0">$</span>
                  <div class="form-floating flex-grow-1">
                    <input th:field="*{price}" th:errorclass="is-invalid" type="text" class="form-control" id="price" placeholder="29.99">
                    <label for="price">Monthly Price</label>
                  </div>
                  <div th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="invalid-feedback d-block"></div>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-floating">
                  <select th:field="*{internetType}" th:errorclass="is-invalid" class="form-select" id="internetType">
                    <option th:each="type : ${T(bg.greencom.greencomwebapp.model.entity.enums.InternetTypeEnum).values()}"
                            th:value="${type.name()}"
                            th:text="${type.getValue()}">
                    </option>
                  </select>
                  <label for="internetType">Internet Type</label>
                  <div th:if="${#fields.hasErrors('internetType')}" th:errors="*{internetType}" class="invalid-feedback"></div>
                </div>
              </div>
            </div>

            <div class="bg-light p-3 rounded mb-4 border shadow-sm">
              <label class="fw-bold text-dark mb-3">
                <i class="bi bi-plus-circle me-2 text-success"></i>Available Extras
              </label>
              <div class="row g-3">
                <div th:each="e : ${T(bg.greencom.greencomwebapp.model.entity.enums.InternetExtraEnum).values()}">

                  <div class="form-check form-switch">
                    <input class="form-check-input"
                           type="checkbox"
                           role="switch"
                           name="internetExtras"
                           th:value="${e}"
                           th:id="${'extra-' + e}">

                    <label class="form-check-label ms-2 fw-medium"
                           th:for="${'extra-' + e}"
                           th:text="${e.getValue()}">
                    </label>
                  </div>
                </div>
              </div>
            </div>
            <!-- Buttons -->
            <div class="row g-2 pt-2">
              <div class="col-sm-8">
                <button type="submit" class="btn btn-success btn-lg w-100 shadow-sm">
                  Create Internet Plan
                </button>
              </div>
              <div class="col-sm-4">
                <a th:href="@{/internet/internet-plans}" class="btn btn-outline-secondary btn-lg w-100">
                  Cancel
                </a>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>

<footer th:replace="~{fragments/commons::footer}"></footer>
</body>
</html>
