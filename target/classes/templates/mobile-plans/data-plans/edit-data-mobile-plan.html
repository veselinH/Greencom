<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/commons::head}"><title>Edit Data Plan | Admin</title></head>
<body class="bg-light">
<header th:replace="~{fragments/commons::navbar}"></header>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
            <div class="card border-0 shadow-lg" style="border-radius: 1rem;">
                <div class="card-body p-4 p-md-5">

                    <!-- Header -->
                    <div class="text-center mb-4">
                        <div class="bg-success bg-opacity-10 d-inline-block p-3 rounded-circle mb-3">
                            <i class="bi bi-pencil-square text-success fs-2"></i>
                        </div>
                        <h2 class="fw-bold">Edit Data Mobile Plan</h2>
                        <p class="text-muted small">Updating: <span class="fw-bold text-dark" th:text="${dataPlanFromRepo.name}">Plan Name</span></p>
                    </div>

                    <form th:object="${dataPlanFromRepo}"
                          th:action="@{/mobile/edit-data-plan/{id}(id=*{id})}"
                          th:method="patch">

                        <!-- Locked Fields Section -->
                        <div class="row g-3 mb-3">
                            <div class="col-md-8">
                                <div class="form-floating">
                                    <input th:field="*{name}" class="form-control bg-light" id="name" readonly>
                                    <label for="name">Plan Name (Locked)</label>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-floating">
                                    <input th:field="*{price}" class="form-control bg-light" id="price" readonly>
                                    <label for="price">Price ($)</label>
                                </div>
                            </div>
                        </div>

                        <!-- Duration Field -->
                        <div class="form-floating mb-4">
                            <input th:field="*{planDuration}" th:errorclass="is-invalid" type="text" class="form-control" id="planDuration" placeholder="Duration">
                            <label for="planDuration">Plan Duration</label>
                            <div th:if="${#fields.hasErrors('planDuration')}" th:errors="*{planDuration}" class="invalid-feedback"></div>
                        </div>

                        <!-- Disabled Voice Fields (Clear visual for Data Plans) -->
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <div class="form-floating opacity-50">
                                    <input type="text" class="form-control bg-light border-0" value="Not Applicable" disabled>
                                    <label>National Minutes</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating opacity-50">
                                    <input type="text" class="form-control bg-light border-0" value="Not Applicable" disabled>
                                    <label>Roaming Minutes</label>
                                </div>
                            </div>
                        </div>

                        <!-- Internet Allocation (Editable as Text for "Unlimited") -->
                        <h5 class="mb-3 text-secondary border-bottom pb-2">
                            <i class="bi bi-wifi me-2"></i>Data Allocation
                        </h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input th:field="*{bgInternetMegabytes}" th:errorclass="is-invalid" type="text" class="form-control" id="bgInternetMegabytes" placeholder="National MB">
                                    <label for="bgInternetMegabytes">National MB</label>
                                    <div th:if="${#fields.hasErrors('bgInternetMegabytes')}" th:errors="*{bgInternetMegabytes}" class="invalid-feedback"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input th:field="*{roamingInternetMegabytes}" th:errorclass="is-invalid" type="text" class="form-control" id="roamingInternetMegabytes" placeholder="Roaming MB">
                                    <label for="roamingInternetMegabytes">Roaming MB</label>
                                    <div th:if="${#fields.hasErrors('roamingInternetMegabytes')}" th:errors="*{roamingInternetMegabytes}" class="invalid-feedback"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Status Switch -->
                        <div class="card bg-light border-0 mb-4">
                            <div class="card-body py-2 d-flex align-items-center justify-content-between">
                                <label class="form-check-label fw-bold text-secondary" for="isActive">Plan Active Status</label>
                                <div class="form-check form-switch p-0 m-0">
                                    <input class="form-check-input" type="checkbox" role="switch" id="isActive" th:field="*{active}" style="width: 2.5em; height: 1.25em;">
                                </div>
                            </div>
                        </div>

                        <div class="bg-light p-3 rounded mb-4 border shadow-sm">
                            <label class="fw-bold text-dark mb-3">
                                <i class="bi bi-plus-circle me-2 text-success"></i>Available Extras
                            </label>
                            <div class="row g-3">
                                <div th:each="e : ${T(bg.greencom.greencomwebapp.model.entity.enums.MobileExtraEnum).values()}">

                                    <div class="form-check form-switch">
                                        <input class="form-check-input"
                                               type="checkbox"
                                               role="switch"
                                               name="mobileExtras"
                                               th:value="${e}"
                                               th:id="${'extra-' + e}">

                                        <label class="form-check-label ms-2 fw-medium"
                                               th:for="${'extra-' + e}"
                                               th:text="${e.getValue()}">
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Actions -->
                        <div class="row g-2">
                            <div class="col-sm-8">
                                <button type="submit" class="btn btn-success btn-lg w-100 shadow-sm fw-bold">Save changes</button>
                            </div>
                            <div class="col-sm-4">
                                <a th:href="@{/mobile/data-plans}" class="btn btn-outline-secondary btn-lg w-100">Cancel</a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
