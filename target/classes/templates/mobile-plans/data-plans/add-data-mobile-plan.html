<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/commons::head}"><title>Add Data Plan | Admin</title></head>
<body class="bg-light">
<header th:replace="~{fragments/commons::navbar}"></header>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
            <div class="card border-0 shadow-lg" style="border-radius: 1rem;">
                <div class="card-body p-4 p-md-5">

                    <!-- Header -->
                    <div class="text-center mb-4">
                        <div class="bg-success bg-opacity-10 d-inline-block p-3 rounded-circle mb-3">
                            <i class="bi bi-reception-4 text-success fs-1"></i>
                        </div>
                        <h2 class="fw-bold">Create Data Mobile Plan</h2>
                        <p class="text-muted small">Establish high-speed national and roaming data packages</p>
                    </div>

                    <form th:object="${dataPlanBindingModel}" th:action="@{/mobile/add-data-plan}" th:method="POST">

                        <!-- Plan Name & Duration Row -->
                        <div class="row g-3 mb-3">
                            <div class="col-md-8">
                                <div class="form-floating">
                                    <input th:field="*{name}" th:errorclass="is-invalid" type="text" class="form-control" id="name" placeholder="Data Unlimited Pro">
                                    <label for="name">Plan Name</label>
                                    <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="invalid-feedback"></div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-floating">
                                    <input th:field="*{planDuration}" th:errorclass="is-invalid" type="text" class="form-control" id="planDuration" placeholder="24 months">
                                    <label for="planDuration">Duration</label>
                                    <div th:if="${#fields.hasErrors('planDuration')}" th:errors="*{planDuration}" class="invalid-feedback"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Non-Applicable Fields (Visual cues for Admin) -->
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control bg-light border-0" value="Not Applicable" readonly>
                                    <label>National Minutes</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control bg-light border-0" value="Not Applicable" readonly>
                                    <label>Roaming Minutes</label>
                                </div>
                            </div>
                        </div>

                        <h5 class="mb-3 text-secondary border-bottom pb-2"><i class="bi bi-wifi me-2"></i>Internet Allocation</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input th:field="*{bgInternetMegabytes}" th:errorclass="is-invalid" type="text" class="form-control" id="bgInternetMegabytes" placeholder="Unlimited">
                                    <label for="bgInternetMegabytes">National MB</label>
                                    <div th:if="${#fields.hasErrors('bgInternetMegabytes')}" th:errors="*{bgInternetMegabytes}" class="invalid-feedback"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input th:field="*{roamingInternetMegabytes}" th:errorclass="is-invalid" type="text" class="form-control" id="roamingInternetMegabytes" placeholder="5000">
                                    <label for="roamingInternetMegabytes">Roaming MB</label>
                                    <div th:if="${#fields.hasErrors('roamingInternetMegabytes')}" th:errors="*{roamingInternetMegabytes}" class="invalid-feedback"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Price Section -->
                        <div class="input-group mb-4">
                            <span class="input-group-text bg-success text-white">$</span>
                            <div class="form-floating flex-grow-1">
                                <input th:field="*{price}" th:errorclass="is-invalid" type="text" class="form-control" id="price" placeholder="19.99">
                                <label for="price">Monthly Price</label>
                            </div>
                            <div th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="invalid-feedback d-block"></div>
                        </div>

                        <!-- Extras (The Loop we perfected) -->
                        <div class="bg-light p-3 rounded mb-4 border shadow-sm">
                            <label class="fw-bold text-dark mb-3">
                                <i class="bi bi-plus-circle me-2 text-success"></i>Available Extras
                            </label>
                            <div class="row g-3">
                                <div th:each="e : ${T(bg.greencom.greencomwebapp.model.entity.enums.MobileExtraEnum).values()}">

                                    <div class="form-check form-switch">
                                        <input class="form-check-input"
                                               type="checkbox"
                                               role="switch"
                                               name="mobileExtras"
                                               th:value="${e}"
                                               th:id="${'extra-' + e}">

                                        <label class="form-check-label ms-2 fw-medium"
                                               th:for="${'extra-' + e}"
                                               th:text="${e.getValue()}">
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Actions -->
                        <div class="row g-2">
                            <div class="col-sm-8">
                                <button type="submit" class="btn btn-success btn-lg w-100 shadow-sm fw-bold">Create Data Plan</button>
                            </div>
                            <div class="col-sm-4">
                                <a th:href="@{/mobile/data-plans}" class="btn btn-outline-secondary btn-lg w-100">Cancel</a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/commons::footer}"></footer>
</body>
</html>
