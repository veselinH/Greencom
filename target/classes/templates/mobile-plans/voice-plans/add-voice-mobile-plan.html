<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/commons::head}"><title>Add Voice Plan | Admin</title></head>
<body class="bg-light">
<header th:replace="~{fragments/commons::navbar}"></header>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
            <div class="card border-0 shadow-lg" style="border-radius: 1rem;">
                <div class="card-body p-4 p-md-5">

                    <!-- Header -->
                    <div class="text-center mb-4">
                        <i class="bi bi-phone-vibrate text-success display-4"></i>
                        <h2 class="fw-bold mt-2">Create Voice Mobile Plan</h2>
                        <p class="text-muted small">Configure national and roaming parameters for the new mobile service</p>
                    </div>

                    <form th:object="${voicePlanBindingModel}" th:action="@{/mobile/add-voice-plan}" th:method="POST">

                        <!-- Plan Name -->
                        <div class="form-floating mb-3">
                            <input th:field="*{name}" th:errorclass="is-invalid" type="text" class="form-control" id="name" placeholder="Unlimited Pro">
                            <label for="name">Plan name</label>
                            <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="invalid-feedback"></div>
                        </div>

                        <div class="row g-3">
                            <!-- Duration -->
                            <div class="col-md-6">
                                <div class="form-floating mb-3">
                                    <input th:field="*{planDuration}" th:errorclass="is-invalid" type="number" class="form-control" id="planDuration" placeholder="24">
                                    <label for="planDuration">Duration (months)</label>
                                    <div th:if="${#fields.hasErrors('planDuration')}" th:errors="*{planDuration}" class="invalid-feedback"></div>
                                </div>
                            </div>
                            <!-- Price -->
                            <div class="col-md-6">
                                <div class="input-group mb-3">
                                    <span class="input-group-text bg-white">$</span>
                                    <div class="form-floating flex-grow-1">
                                        <input th:field="*{price}" th:errorclass="is-invalid" type="text" class="form-control" id="price" placeholder="29.99">
                                        <label for="price">Monthly Price</label>
                                    </div>
                                    <div th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="invalid-feedback d-block"></div>
                                </div>
                            </div>
                        </div>

                        <hr class="my-4 text-muted">
                        <h5 class="mb-3 text-secondary"><i class="bi bi-telephone me-2"></i>Minutes</h5>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="form-floating mb-3">
                                    <input th:field="*{bgMinutes}" th:errorclass="is-invalid" type="text" class="form-control" id="bgMinutes" placeholder="1000">
                                    <label for="bgMinutes">National Minutes</label>
                                    <div th:if="${#fields.hasErrors('bgMinutes')}" th:errors="*{bgMinutes}" class="invalid-feedback"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating mb-3">
                                    <input th:field="*{roamingMinutes}" th:errorclass="is-invalid" type="text" class="form-control" id="roamingMinutes" placeholder="200">
                                    <label for="roamingMinutes">Roaming Minutes</label>
                                    <div th:if="${#fields.hasErrors('roamingMinutes')}" th:errors="*{roamingMinutes}" class="invalid-feedback"></div>
                                </div>
                            </div>
                        </div>

                        <h5 class="mb-3 mt-2 text-secondary"><i class="bi bi-globe me-2"></i>Data (MB)</h5>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="form-floating mb-3">
                                    <input th:field="*{bgInternetMegabytes}" th:errorclass="is-invalid" type="text" class="form-control" id="bgInternetMegabytes" placeholder="5000">
                                    <label for="bgInternetMegabytes">National MB</label>
                                    <div th:if="${#fields.hasErrors('bgInternetMegabytes')}" th:errors="*{bgInternetMegabytes}" class="invalid-feedback"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating mb-3">
                                    <input th:field="*{roamingInternetMegabytes}" th:errorclass="is-invalid" type="text" class="form-control" id="roamingInternetMegabytes" placeholder="500">
                                    <label for="roamingInternetMegabytes">Roaming MB</label>
                                    <div th:if="${#fields.hasErrors('roamingInternetMegabytes')}" th:errors="*{roamingInternetMegabytes}" class="invalid-feedback"></div>
                                </div>
                            </div>
                        </div>

                        <div class="bg-light p-3 rounded mb-4 border shadow-sm">
                            <label class="fw-bold text-dark mb-3">
                                <i class="bi bi-plus-circle me-2 text-success"></i>Available Extras
                            </label>
                            <div class="row g-3">
                                <div th:each="e : ${T(bg.greencom.greencomwebapp.model.entity.enums.MobileExtraEnum).values()}">

                                    <div class="form-check form-switch">
                                      <input class="form-check-input"
                                             type="checkbox"
                                             role="switch"
                                             name="mobileExtras"
                                             th:value="${e}"
                                             th:id="${'extra-' + e}">

                                        <label class="form-check-label ms-2 fw-medium"
                                               th:for="${'extra-' + e}"
                                               th:text="${e.getValue()}">
                                      </label>
                                    </div>
                                </div>
                            </div>
                        </div>


                        <!-- Buttons -->
                        <div class="row g-2 pt-2">
                            <div class="col-sm-8">
                                <button type="submit" class="btn btn-success btn-lg w-100 shadow-sm">
                                Create Voice Plan
                                </button>
                            </div>
                            <div class="col-sm-4">
                                <a th:href="@{/mobile/voice-plans}" class="btn btn-outline-secondary btn-lg w-100">
                                    Cancel
                                </a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/commons::footer}"></footer>
</body>
</html>
