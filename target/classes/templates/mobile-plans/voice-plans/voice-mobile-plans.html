<div class="container-fluid">
    <div class="container p-5">
        <div class="row">
            <div th:each="v : ${allVoicePlans}" th:object="${v}" class="col-lg-4 col-md-12 mb-4">
                <div class="card card1 h-100">
                    <div class="card-body">

                        <h5 th:text="*{name}" class="card-title"></h5>
                        <small th:text="|*{planDuration} plan duration|" class='text-muted'></small>
                        <br><br>
                        <span th:text="*{price}" class="h2">$8</span>$/month
                        <br><br>
<!--                        <form th:action="@{/mobile/voice-plan/{id}(id=*{id})}"-->
<!--                              th:method="patch"-->
<!--                              class="d-grid my-3">-->
<!--                            <input type="submit" class="btn btn-outline-dark btn-block" value="Sign">-->
<!--                        </form>-->
                        <div class="d-grid my-3">
                            <button type="button"
                                    class="btn btn-outline-dark btn-block"
                                    data-toggle="modal"
                                    data-target="#signatureModal"
                                    th:data-id="${id}"
                                    th:data-action="@{/mobile/voice-plan/{id}(id=*{id})}">
                                Sign
                            </button>
                        </div>
                        <div class="d-grid my-3" sec:authorize="hasRole('ADMIN')">
                            <a th:href="@{/mobile/edit-voice-plan/{id}(id=*{id})}"
                               class="btn btn-outline-dark btn-block">Edit</a>
                        </div>
                        <form th:action="@{/mobile/voice-plan/{name}(name=*{name})}"
                              th:method="delete"
                              sec:authorize="hasRole('ADMIN')">
                            <input type="submit" class="btn btn-outline-dark btn-block" value="Remove">
                        </form>

                        <ul>
                            <li th:text="|*{bgMinutes} national minutes|"></li>
                            <li th:text="|*{bgInternetMegabytes} national MB|"></li>
                            <li th:text="|*{roamingMinutes} roaming minutes|"></li>
                            <li th:text="|*{roamingInternetMegabytes} roaming MB|"></li>
                            <li class="dropdown-divider">Mobile extras</li>
                            <li th:each="e : ${v.getMobileExtras()}" th:object="${e}"
                                th:text="${e.getName().getValue()}"></li>

                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
