<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/commons::head}"><title>Voice Plans | Greencom</title></head>
<body class="bg-light">
<header th:replace="~{fragments/commons::navbar}"></header>

<main class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold text-success">Mobile Voice Plans</h1>
        <p class="text-muted">Unlimited conversations and reliable national coverage</p>
    </div>

    <div class="row g-4">
        <div th:each="v : ${allVoicePlans}"
             th:object="${v}"
             th:if="${v.active} or ${#authorization.expression('hasRole(''ADMIN'')')}"
             class="col-md-4 col-sm-6">

            <!-- Plan Card with Hover Effect -->
            <div class="card h-100 shadow-sm border-0 plan-card hover-shadow transition">
                <!-- Admin Badges -->
                <div class="position-absolute top-0 end-0 p-2 d-flex flex-column align-items-end" sec:authorize="hasRole('ADMIN')">
                    <span class="badge bg-dark mb-1" th:text="|ID: *{id}|">ID: 1</span>
                    <span th:if="*{active}" class="badge bg-success">Active</span>
                    <span th:unless="*{active}" class="badge bg-danger">Inactive</span>
                </div>

                <div class="card-body p-4">
                    <h4 th:text="*{name}" class="fw-bold mb-1"></h4>
                    <p class="text-muted small mb-4">
                        <i class="bi bi-calendar-check me-1"></i>
                        <span th:text="|*{planDuration} month duration|"></span>
                    </p>

                    <div class="mb-4">
                        <span class="display-5 fw-bold text-dark" th:text="*{price}">8</span>
                        <span class="text-muted">$/month</span>
                    </div>

                    <!-- Voice Details -->
                    <ul class="list-unstyled mb-4">
                        <li class="mb-2">
                            <i class="bi bi-telephone-fill text-success me-2"></i>
                            <strong th:text="*{bgMinutes}"></strong> National Minutes
                        </li>
                        <li class="mb-2">
                            <i class="bi bi-globe-europe-africa text-success me-2"></i>
                            <strong th:text="*{roamingMinutes}"></strong> Roaming Minutes
                        </li>
                        <li class="mb-2">
                            <i class="bi bi-wifi text-success me-2"></i>
                            <strong th:text="*{bgInternetMegabytes}"></strong> National MB
                        </li>
                        <li class="mb-3">
                            <i class="bi bi-airplane-fill text-success me-2"></i>
                            <strong th:text="*{roamingInternetMegabytes}"></strong> Roaming MB
                        </li>

                        <!-- Mobile Extras Section -->
                        <li th:if="${not #lists.isEmpty(v.getMobileExtras())}" class="mt-3">
                            <hr class="dropdown-divider">
                            <p class="small fw-bold text-muted text-uppercase mb-2">Included Extras:</p>
                            <div th:each="e : ${v.getMobileExtras()}" class="badge bg-light text-success border me-1 mb-1">
                                <i class="bi bi-plus-circle me-1"></i>
                                <span th:text="${e.getName().getValue()}"></span>
                            </div>
                        </li>
                    </ul>

                    <!-- Action Buttons -->
                    <div class="d-grid gap-2 mt-auto">
                        <button type="button"
                                class="btn btn-success btn-lg shadow-sm"
                                th:classappend="!*{active} ? 'disabled' : ''"
                                th:disabled="!*{active}"
                                data-bs-toggle="modal"
                                data-bs-target="#signatureModal"
                                th:data-id="*{id}"
                                th:data-action="@{/mobile/voice-plan/{id}(id=*{id})}">
                            Sign Contract
                        </button>

                        <a th:href="@{/mobile/edit-voice-plan/{id}(id=*{id})}"
                           class="btn btn-outline-dark"
                           sec:authorize="hasRole('ADMIN')">
                            <i class="bi bi-pencil me-1"></i> Edit Plan
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/commons::footer}"></footer>

</body>
</html>
