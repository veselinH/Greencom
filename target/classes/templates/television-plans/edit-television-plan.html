<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/commons::head}"><title>Edit Television Plan | Admin</title></head>
<body class="bg-light">
<header th:replace="~{fragments/commons::navbar}"></header>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-9 col-lg-7 col-xl-6">
            <div class="card border-0 shadow-lg" style="border-radius: 1rem;">
                <div class="card-body p-4 p-md-5">

                    <!-- Header with Icon -->
                    <div class="text-center mb-4">
                        <div class="bg-success bg-opacity-10 d-inline-block p-3 rounded-circle mb-3">
                            <i class="bi bi-pencil-square text-success fs-2"></i>
                        </div>
                        <h2 class="fw-bold">Edit Plan</h2>
                        <p class="text-muted small">Update the parameters for the <span class="fw-bold text-dark" th:text="*{name}">Plan</span> package</p>
                    </div>

                    <form th:object="${televisionPlanFromRepo}"
                          th:action="@{/television/edit-television-plan/{id}(id=*{id})}"
                          th:method="patch">

                        <!-- Plan Name (Read-only aesthetic) -->
                        <div class="form-floating mb-3">
                            <input th:field="*{name}" class="form-control bg-light" id="name" placeholder="Name" readonly>
                            <label for="name">Plan Name (Locked)</label>
                            <div class="form-text text-muted small">The name of an existing plan cannot be changed.</div>
                        </div>

                        <div class="row g-3">
                            <!-- Duration -->
                            <div class="col-md-6">
                                <div class="form-floating mb-3">
                                    <input th:field="*{planDuration}" th:errorclass="is-invalid" type="number" class="form-control" id="planDuration" placeholder="24">
                                    <label for="planDuration">Duration (months)</label>
                                    <div th:if="${#fields.hasErrors('planDuration')}" th:errors="*{planDuration}" class="invalid-feedback"></div>
                                </div>
                            </div>
                            <!-- Price (Read-only aesthetic) -->
                            <div class="col-md-6">
                                <div class="form-floating mb-3">
                                    <input th:field="*{price}" class="form-control bg-light" id="price" placeholder="0.00" readonly>
                                    <label for="price">Price ($)</label>
                                    <div class="form-text text-muted small">Price is locked for existing plans.</div>
                                </div>
                            </div>
                        </div>

                        <div class="row g-3">
                            <!-- Channel Count -->
                            <div class="col-md-6">
                                <div class="form-floating mb-3">
                                    <input th:field="*{channelCount}" th:errorclass="is-invalid" type="number" class="form-control" id="channelCount" placeholder="100">
                                    <label for="channelCount">Channel Count</label>
                                    <div th:if="${#fields.hasErrors('channelCount')}" th:errors="*{channelCount}" class="invalid-feedback"></div>
                                </div>
                            </div>
                            <!-- HD Channel Count -->
                            <div class="col-md-6">
                                <div class="form-floating mb-3">
                                    <input th:field="*{channelCountHD}" th:errorclass="is-invalid" type="number" class="form-control" id="channelCountHD" placeholder="20">
                                    <label for="channelCountHD">HD Channels</label>
                                    <div th:if="${#fields.hasErrors('channelCountHD')}" th:errors="*{channelCountHD}" class="invalid-feedback"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Status Switch -->
                        <div class="card bg-light border-0 mb-4">
                            <div class="card-body py-2 d-flex align-items-center justify-content-between">
                                <label class="form-check-label fw-bold text-secondary" for="isActive">Activate/Deactivate</label>
                                <div class="form-check form-switch p-0 m-0">
                                    <input class="form-check-input" type="checkbox" role="switch" id="isActive" th:field="*{active}" style="width: 3em; height: 1.5em; cursor: pointer;">
                                </div>
                            </div>
                        </div>

                        <!-- Buttons -->
                        <div class="row g-2">
                            <div class="col-sm-8">
                                <button type="submit" class="btn btn-success btn-lg w-100 shadow-sm">
                                    Save Changes
                                </button>
                            </div>
                            <div class="col-sm-4">
                                <a th:href="@{/television/television-plans}" class="btn btn-outline-secondary btn-lg w-100">
                                    Cancel
                                </a>
                            </div>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/commons::footer}"></footer>
</body>
</html>
