<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/commons::head}"><title>Add Television Plan | Admin</title></head>
<body class="bg-light">
<header th:replace="~{fragments/commons::navbar}"></header>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-9 col-lg-7 col-xl-6">
            <div class="card border-0 shadow-lg" style="border-radius: 1rem;">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-tv text-success display-4"></i>
                        <h2 class="fw-bold mt-2">Create Television Plan</h2>
                        <p class="text-muted small">Fill in the details to launch a new service package</p>
                    </div>

                    <form th:object="${televisionPlanBindingModel}" th:action="@{/television/add-television-plan}" th:method="POST">

                        <!-- Plan Name -->
                        <div class="form-floating mb-3">
                            <input th:field="*{name}" th:errorclass="is-invalid" type="text" class="form-control" id="name" placeholder="Super TV Max">
                            <label for="name">Plan name</label>
                            <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="invalid-feedback"></div>
                        </div>

                        <div class="row g-3">
                            <!-- Duration -->
                            <div class="col-md-6">
                                <div class="form-floating mb-3">
                                    <input th:field="*{planDuration}" th:errorclass="is-invalid" type="number" class="form-control" id="planDuration" placeholder="24">
                                    <label for="planDuration">Duration (months)</label>
                                    <div th:if="${#fields.hasErrors('planDuration')}" th:errors="*{planDuration}" class="invalid-feedback"></div>
                                </div>
                            </div>
                            <!-- Price -->
                            <div class="col-md-6">
                                <div class="input-group mb-3">
                                    <span class="input-group-text bg-white">$</span>
                                    <div class="form-floating flex-grow-1">
                                        <input th:field="*{price}" th:errorclass="is-invalid" type="text" class="form-control" id="price" placeholder="19.99">
                                        <label for="price">Monthly Price</label>
                                    </div>
                                    <div th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="invalid-feedback d-block"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Television Type -->
                        <div class="form-floating mb-3">
                            <select th:field="*{televisionType}" th:errorclass="is-invalid" class="form-select" id="televisionType">
                                <option th:each="type : ${T(bg.greencom.greencomwebapp.model.entity.enums.TelevisionTypeEnum).values()}"
                                        th:value="${type.name()}"
                                        th:text="${type.getValue()}">
                                </option>
                            </select>
                            <label for="televisionType">Television type</label>
                            <div th:if="${#fields.hasErrors('televisionType')}" th:errors="*{televisionType}" class="invalid-feedback"></div>
                        </div>

                        <div class="row g-3">
                            <!-- Channels -->
                            <div class="col-md-6">
                                <div class="form-floating mb-3">
                                    <input th:field="*{channelCount}" th:errorclass="is-invalid" type="number" class="form-control" id="channelCount" placeholder="150">
                                    <label for="channelCount">Total Channels</label>
                                    <div th:if="${#fields.hasErrors('channelCount')}" th:errors="*{channelCount}" class="invalid-feedback"></div>
                                </div>
                            </div>
                            <!-- HD Channels -->
                            <div class="col-md-6">
                                <div class="form-floating mb-4">
                                    <input th:field="*{channelCountHD}" th:errorclass="is-invalid" type="number" class="form-control" id="channelCountHD" placeholder="40">
                                    <label for="channelCountHD">HD Channels</label>
                                    <div th:if="${#fields.hasErrors('channelCountHD')}" th:errors="*{channelCountHD}" class="invalid-feedback"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Buttons -->
                        <div class="row g-2 pt-2">
                            <div class="col-sm-8">
                                <button type="submit" class="btn btn-success btn-lg w-100 shadow-sm">
                                    <i class="bi bi-plus-circle me-2"></i>Create Plan
                                </button>
                            </div>
                            <div class="col-sm-4">
                                <a th:href="@{/television/television-plans}" class="btn btn-outline-secondary btn-lg w-100">
                                    Cancel
                                </a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/commons::footer}"></footer>
</body>
</html>
