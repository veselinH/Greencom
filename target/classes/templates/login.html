<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/commons::head}"><title>Login | Greencom</title></head>
<body class="bg-light"> <!-- Light gray background for contrast -->

<header th:replace="~{fragments/commons::navbar}"></header>

<main class="container py-5">
    <section class="row justify-content-center">
        <div class="col-xl-10">
            <!-- Main Login Card -->
            <div class="card border-0 shadow-lg overflow-hidden">
                <div class="row g-0">

                    <!-- Left Side: Image (Hidden on mobile) -->
                    <div class="col-lg-5 d-none d-lg-block">
                        <img src="/images/phone.jpg" alt="Login"
                             class="h-100 w-100" style="object-fit: cover;">
                    </div>

                    <!-- Right Side: Form -->
                    <div class="col-lg-7 bg-white">
                        <div class="card-body p-4 p-md-5">

                            <div class="text-center mb-4">
                                <h2 class="fw-bold text-success">Welcome Back</h2>
                                <p class="text-muted">Enter your credentials to access your account</p>
                            </div>

                            <form th:action="@{/users/login}" th:method="post">

                                <!-- Error Message -->
                                <div class="alert alert-danger d-flex align-items-center mb-4" role="alert" th:if="${bad_credentials}">
                                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                                    <div>Invalid username or password</div>
                                </div>

                                <!-- Floating Username Input -->
                                <div class="form-floating mb-3">
                                    <input id="username"
                                           th:value="${username}"
                                           name="username"
                                           type="text"
                                           class="form-control"
                                           placeholder="Username"
                                           required>
                                    <label for="username">Username</label>
                                </div>

                                <!-- Floating Password Input -->
                                <div class="form-floating mb-4">
                                    <input name="password"
                                           type="password"
                                           id="password"
                                           class="form-control"
                                           placeholder="Password"
                                           required>
                                    <label for="password">Password</label>
                                </div>

                                <!-- Action Buttons -->
                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-success btn-lg shadow-sm">
                                        Sign in
                                    </button>
                                </div>

                                <!-- Divider -->
                                <div class="d-flex align-items-center my-4">
                                    <hr class="flex-grow-1 m-0">
                                    <span class="px-3 text-muted small">OR</span>
                                    <hr class="flex-grow-1 m-0">
                                </div>

                                <!-- Google OAuth2 Sign-In (GET to Spring's authorization endpoint) -->
                                <div class="d-grid gap-2">
                                    <a th:href="@{/oauth2/authorization/google}"
                                       class="btn btn-google btn-lg shadow-sm d-flex align-items-center justify-content-center gap-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
                                            <path fill="#4285F4" d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
                                            <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A9 9 0 0 0 9 18z"/>
                                            <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A9 9 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
                                            <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.346l2.582-2.581C13.463.891 11.426 0 9 0A9 9 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
                                        </svg>
                                        Sign in with Google
                                    </a>
                                </div>

                                <!-- Facebook OAuth2 Sign-In (GET to Spring's authorization endpoint) -->
                                <div class="d-grid gap-2">
                                    <a th:href="@{/oauth2/authorization/facebook}"
                                       class="btn btn-facebook btn-lg shadow-sm d-flex align-items-center justify-content-center gap-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="#ffffff" aria-hidden="true">
                                            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                                        </svg>
                                        Sign in with Facebook
                                    </a>
                                </div>

                                <!-- GitHub OAuth2 Sign-In (GET to Spring's authorization endpoint) -->
                                <div class="d-grid gap-2">
                                    <a th:href="@{/oauth2/authorization/github}"
                                       class="btn btn-github btn-lg shadow-sm d-flex align-items-center justify-content-center gap-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="#ffffff" aria-hidden="true">
                                            <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222 0 1.606-.014 2.898-.014 3.293 0 .322.216.694.825.576C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12z"/>
                                        </svg>
                                        Sign in with GitHub
                                    </a>
                                </div>

                                <div class="mt-4 text-center">
                                    <p class="small text-muted mb-0">Don't have an account?</p>
                                    <a th:href="@{/users/register}" class="text-success fw-bold text-decoration-none">
                                        Create a new account
                                    </a>
                                </div>
                            </form>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/commons::footer}"></footer>
