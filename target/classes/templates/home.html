<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/commons::head"><title>Greencom</title></head>
<body>
<header th:replace="fragments/commons::navbar"></header>


<div id="carouselExampleSlidesOnly" class="carousel slide" data-ride="carousel">
    <!--    TODO-->
    <div class="carousel-inner">
        <div class="carousel-item active">
            <img class="d-block w-100" src="/images/5g_network.png" alt="First slide">
        </div>
        <div class="carousel-item">
            <img class="d-block w-100" src="/images/TV_fiber.png" alt="Second slide">
        </div>
        <div class="carousel-item">
            <img class="d-block w-100" src="/images/Landline_banner.png" alt="Third slide">
        </div>
    </div>
</div>

<div class="container text-center">
    <h3>Choose a service</h3><br>
    <div class="row">
        <div class="col-sm-4">
            <a th:href="@{/mobile/voice-plans}">
                <img src="/images/Voice_button.png" class="img-responsive" style="width:100%" alt="Image">
            </a>
        </div>
        <div class="col-sm-4">
            <a th:href="@{/mobile/data-plans}">
                <img src="/images/Data_button.png" class="img-responsive" style="width:100%" alt="Image">
            </a>
        </div>
        <div class="col-sm-4">
            <a th:href="@{/internet/internet-plans}">
                <img src="/images/Fiber_button.png" class="img-responsive" style="width:100%" alt="Image">
            </a>
        </div>
        <div class="col-sm-4">
            <a th:href="@{/television/television-plans}">
                <img src="/images/TV_button.png" class="img-responsive" style="width:100%" alt="Image">
            </a>
        </div>
        <div class="col-sm-4">
            <a th:href="@{/landline-plans}">
                <img src="https://placehold.it/150x80?text=IMAGE" class="img-responsive" style="width:100%" alt="Image">
            </a>
            <p>Landline plans</p>
        </div>
    </div>
</div>
<br>

<footer th:replace="fragments/commons::footer"></footer>

</body>
</html>
