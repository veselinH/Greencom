<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/commons::head}"><title>Edit Voice Plan | Admin</title></head>
<body class="bg-light">
<header th:replace="~{fragments/commons::navbar}"></header>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
            <div class="card border-0 shadow-lg" style="border-radius: 1rem;">
                <div class="card-body p-4 p-md-5">

                    <div class="text-center mb-4">
                        <div class="bg-success bg-opacity-10 d-inline-block p-3 rounded-circle mb-3">
                            <i class="bi bi-pencil-square text-success fs-2"></i>
                        </div>
                        <h2 class="fw-bold">Edit Voice Plan</h2>
                        <p class="text-muted small">Updating: <span class="fw-bold text-dark" th:text="${voicePlanFromRepo.name}">Plan</span></p>
                    </div>

                    <!-- Using th:method="patch" requires HiddenHttpMethodFilter in Spring Boot -->
                    <form th:object="${voicePlanFromRepo}"
                          th:action="@{/mobile/edit-voice-plan/{id}(id=*{id})}"
                          th:method="patch">

                        <!-- Name & Price (Read-only aesthetic) -->
                        <div class="row g-3 mb-3">
                            <div class="col-md-8">
                                <div class="form-floating">
                                    <input th:field="*{name}" class="form-control bg-light" id="name" readonly>
                                    <label for="name">Plan Name</label>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-floating">
                                    <input th:field="*{price}" class="form-control bg-light" id="price" readonly>
                                    <label for="price">Price ($)</label>
                                </div>
                            </div>
                        </div>

                        <div class="form-floating mb-4">
                            <input th:field="*{planDuration}" th:errorclass="is-invalid" type="text" class="form-control" id="planDuration">
                            <label for="planDuration">Plan Duration (e.g. 24 months)</label>
                        </div>

                        <h5 class="mb-3 text-secondary border-bottom pb-2">
                            <i class="bi bi-telephone-fill me-2"></i>Minutes (Type 'Unlimited' if needed)
                        </h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input th:field="*{bgMinutes}" th:errorclass="is-invalid" type="text" class="form-control" id="bgMinutes">
                                    <label for="bgMinutes">National Minutes</label>
                                    <div th:if="${#fields.hasErrors('bgMinutes')}" th:errors="*{bgMinutes}" class="invalid-feedback"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input th:field="*{roamingMinutes}" th:errorclass="is-invalid" type="text" class="form-control" id="roamingMinutes">
                                    <label for="roamingMinutes">Roaming Minutes</label>
                                </div>
                            </div>
                        </div>

                        <h5 class="mb-3 text-secondary border-bottom pb-2">
                            <i class="bi bi-wifi me-2"></i>Data (Type 'Unlimited' if needed)
                        </h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input th:field="*{bgInternetMegabytes}" th:errorclass="is-invalid" type="text" class="form-control" id="bgInternetMegabytes">
                                    <label for="bgInternetMegabytes">National MB</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input th:field="*{roamingInternetMegabytes}" th:errorclass="is-invalid" type="text" class="form-control" id="roamingInternetMegabytes">
                                    <label for="roamingInternetMegabytes">Roaming MB</label>
                                </div>
                            </div>
                        </div>

                        <!-- Status Switch -->
                        <div class="card bg-light border-0 mb-4">
                            <div class="card-body py-2 d-flex align-items-center justify-content-between">
                                <label class="form-check-label fw-bold text-secondary" for="isActive">Activate/Deactivate</label>
                                <div class="form-check form-switch p-0 m-0">
                                    <input class="form-check-input" type="checkbox" role="switch" id="isActive" th:field="*{active}" style="width: 2.5em; height: 1.25em;">
                                </div>
                            </div>
                        </div>

                        <!-- Extras (The Loop we perfected) -->
                        <div class="bg-light p-3 rounded mb-4 border shadow-sm">
                            <label class="fw-bold text-dark mb-3">
                                <i class="bi bi-plus-circle me-2 text-success"></i>Available Extras
                            </label>
                            <div class="row g-3">
                                <div th:each="e : ${T(bg.greencom.greencomwebapp.model.entity.enums.MobileExtraEnum).values()}">

                                    <div class="form-check form-switch">
                                        <input class="form-check-input"
                                               type="checkbox"
                                               role="switch"
                                               name="mobileExtras"
                                               th:value="${e}"
                                               th:id="${'extra-' + e}">

                                        <label class="form-check-label ms-2 fw-medium"
                                               th:for="${'extra-' + e}"
                                               th:text="${e.getValue()}">
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="row g-2">
                            <div class="col-sm-8">
                              <button type="submit" class="btn btn-success btn-lg w-100 shadow-sm">Save Changes</button>
                            </div>
                            <div class="col-sm-4">
                              <a th:href="@{/mobile/voice-plans}" class="btn btn-outline-secondary btn-lg w-100">Cancel</a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/commons::footer}"></footer>
</body>
</html>
