<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/commons::head}"><title>Register | Greencom</title></head>
<body class="bg-light">

<header th:replace="~{fragments/commons::navbar}"></header>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-9 col-lg-7 col-xl-6">
            <!-- Registration Card -->
            <div class="card border-0 shadow-lg" style="border-radius: 1rem;">
                <div class="card-body p-4 p-md-5">
                    <h2 class="text-uppercase text-center mb-5 fw-bold text-success">Create an account</h2>

                    <form th:object="${userRegisterBindingModel}" th:action="@{/users/register}" th:method="POST">

                        <!-- First Name -->
                        <div class="form-floating mb-3">
                            <input th:field="*{firstName}"
                                   th:errorclass="is-invalid"
                                   type="text" class="form-control" id="firstName" placeholder="Veselin">
                            <label for="firstName">First name</label>
                            <div th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" class="invalid-feedback"></div>
                        </div>

                        <!-- Last Name -->
                        <div class="form-floating mb-3">
                            <input th:field="*{lastName}"
                                   th:errorclass="is-invalid"
                                   type="text" class="form-control" id="lastName" placeholder="Hristov">
                            <label for="lastName">Last name</label>
                            <div th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" class="invalid-feedback"></div>
                        </div>

                        <!-- Username -->
                        <div class="form-floating mb-3">
                            <input th:field="*{username}"
                                   th:errorclass="is-invalid"
                                   type="text" class="form-control" id="username" placeholder="Username">
                            <label for="username">Username</label>
                            <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="invalid-feedback"></div>
                        </div>

                        <!-- Email -->
                        <div class="form-floating mb-3">
                            <input th:field="*{email}"
                                   th:errorclass="is-invalid"
                                   type="email" class="form-control" id="email" placeholder="email@example.com">
                            <label for="email">Email</label>
                            <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="invalid-feedback"></div>
                        </div>

                        <!-- Password -->
                        <div class="form-floating mb-3">
                            <input th:field="*{password}"
                                   th:errorclass="is-invalid"
                                   type="password" class="form-control" id="password" placeholder="Password">
                            <label for="password">Password</label>
                            <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="invalid-feedback"></div>
                        </div>

                        <!-- Confirm Password -->
                        <div class="form-floating mb-4">
                            <input th:field="*{confirmPassword}"
                                   th:errorclass="is-invalid"
                                   type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password">
                            <label for="confirmPassword">Confirm your password</label>
                            <div th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="invalid-feedback"></div>
                        </div>

                        <!-- Submit -->
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success btn-lg shadow-sm">
                                Register Now
                            </button>
                        </div>

                        <p class="text-center text-muted mt-4 mb-0">Already have an account?
                            <a th:href="@{/users/login}" class="fw-bold text-success text-decoration-none">Login here</a>
                        </p>
                    </form>

                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/commons::footer}"></footer>
</body>
</html>
