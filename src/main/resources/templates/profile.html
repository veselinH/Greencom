<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/commons::head"><title>Greencom</title></head>
<body>
<header th:replace="fragments/commons::navbar"></header>

<div class="container mt-5">
    <!-- Success Alert -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
            <span aria-hidden="true">&times;</span>
        </button>
    </div>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <!-- This is the 'box' (Bootstrap Card) -->
            <div class="card shadow">
                <div class="card-header bg-success text-white text-center">
                    <h3>User Profile</h3>
                </div>
                <div class="card-body">
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item">
                            <strong>Username:</strong>
                            <span th:text="${#authentication.name}">Username</span>
                        </li>
                        <li class="list-group-item">
                            <strong>First Name:</strong>
                            <span th:text="${#authentication.principal.firstName}">First Name</span>
                        </li>
                        <li class="list-group-item">
                            <strong>Last Name:</strong>
                            <span th:text="${#authentication.principal.lastName}">Last Name</span>
                        </li>
                        <li class="list-group-item">
                            <strong>Email:</strong>
                            <span th:text="${#authentication.principal.email}">Email</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container-fluid">
    <div class="container p-5">
        <h2 class="text-center mb-4">My Voice Plans</h2>
        <div class="row">
            <div th:each="v : ${userVoicePlans}" th:object="${v}" class="col-lg-4 col-md-12 mb-4">
                <div class="card card1 h-100">
                    <div class="card-body">

                        <h5 th:text="*{name}" class="card-title"></h5>
                        <small th:text="|*{planDuration} plan duration|" class='text-muted'></small>
                        <br><br>
                        <span th:text="*{price}" class="h2">$8</span>$/month
                        <br><br>
                        <div class="d-grid my-3">
                            <button type="button"
                                    class="btn btn-outline-dark btn-block"
                                    data-toggle="modal"
                                    data-target="#signatureModal"
                                    th:data-id="${id}"
                                    th:data-action="@{/users/unsign/voice/{id}(id=*{contractId})}">
                                Unsign
                            </button>
                        </div>
                        <ul>
                            <li th:text="|*{bgMinutes} national minutes|"></li>
                            <li th:text="|*{bgInternetMegabytes} national MB|"></li>
                            <li th:text="|*{roamingMinutes} roaming minutes|"></li>
                            <li th:text="|*{roamingInternetMegabytes} roaming MB|"></li>
                            <li class="dropdown-divider">Mobile extras</li>
                            <li th:each="e : ${v.getMobileExtras()}" th:object="${e}"
                                th:text="${e.getName().getValue()}"></li>

                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:if="${userVoicePlans.isEmpty()}" class="alert alert-warning text-center">
        No voice plans found for your account.
    </div>
</div>

<footer th:replace="fragments/commons::footer"></footer>
</body>
</html>
