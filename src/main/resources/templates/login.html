<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/commons::head}"><title>Login | Greencom</title></head>
<body class="bg-light"> <!-- Light gray background for contrast -->

<header th:replace="~{fragments/commons::navbar}"></header>

<main class="container py-5">
    <section class="row justify-content-center">
        <div class="col-xl-10">
            <!-- Main Login Card -->
            <div class="card border-0 shadow-lg overflow-hidden">
                <div class="row g-0">

                    <!-- Left Side: Image (Hidden on mobile) -->
                    <div class="col-lg-5 d-none d-lg-block">
                        <img src="/images/phone.jpg" alt="Login"
                             class="h-100 w-100" style="object-fit: cover;">
                    </div>

                    <!-- Right Side: Form -->
                    <div class="col-lg-7 bg-white">
                        <div class="card-body p-4 p-md-5">

                            <div class="text-center mb-4">
                                <h2 class="fw-bold text-success">Welcome Back</h2>
                                <p class="text-muted">Enter your credentials to access your account</p>
                            </div>

                            <form th:action="@{/users/login}" th:method="post">

                                <!-- Error Message -->
                                <div class="alert alert-danger d-flex align-items-center mb-4" role="alert" th:if="${bad_credentials}">
                                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                                    <div>Invalid username or password</div>
                                </div>

                                <!-- Floating Username Input -->
                                <div class="form-floating mb-3">
                                    <input id="username"
                                           th:value="${username}"
                                           name="username"
                                           type="text"
                                           class="form-control"
                                           placeholder="Username"
                                           required>
                                    <label for="username">Username</label>
                                </div>

                                <!-- Floating Password Input -->
                                <div class="form-floating mb-4">
                                    <input name="password"
                                           type="password"
                                           id="password"
                                           class="form-control"
                                           placeholder="Password"
                                           required>
                                    <label for="password">Password</label>
                                </div>

                                <!-- Action Buttons -->
                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-success btn-lg shadow-sm">
                                        Sign in
                                    </button>
                                </div>

                                <div class="mt-4 text-center">
                                    <p class="small text-muted mb-0">Don't have an account?</p>
                                    <a th:href="@{/users/register}" class="text-success fw-bold text-decoration-none">
                                        Create a new account
                                    </a>
                                </div>
                            </form>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/commons::footer}"></footer>

</body>
</html>
